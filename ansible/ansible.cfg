[defaults]
inventory = ./inventory
private_key_file = ~/.ssh/id_ed25519
remote_user = rob
# facts are accessed via the ansible_facts dict, not injected as top-level vars
# (top-level injection is deprecated, removed in ansible-core 2.24)
inject_facts_as_vars = False
# auto-discover the remote python but don't warn about it (Debian default: /usr/bin/python3)
interpreter_python = auto_silent

[inventory]
enable_plugins = community.proxmox.proxmox,yaml
