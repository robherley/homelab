plugin: community.proxmox.proxmox

url: https://r7920.lab.reb.gg:8006
# API token auth (scripts@pve!scripts). The secret is not stored here —
# it comes from $PROXMOX_TOKEN_SECRET, injected by `op run` (see justfile).
user: scripts@pve
token_id: scripts

validate_certs: false
strict: yes
want_facts: yes
want_proxmox_nodes_ansible_host: no

# only inventory VMs/containers tagged 'ansible'
filters:
  - "'ansible' in (proxmox_tags_parsed | default([]))"

keyed_groups:
  - key: proxmox_tags_parsed
    separator: "_"
    prefix: tag
    default_value: none
