- name: dump some debug info
  hosts:
    - proxmox
    - proxmox_all_running
  gather_facts: true
  tasks:
    - name: print ansible distribution info
      debug:
        msg: "{{ ansible_facts['distribution'] }} ({{ ansible_facts['distribution_version'] }}) | {{ ansible_facts['os_family'] }}-based"
    - name: print ipv4
      debug: var=ansible_facts.all_ipv4_addresses
